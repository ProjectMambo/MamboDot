# =============================================================================
# KEYBINDS
# =============================================================================

# --- MODIFIERS ---
$mod = SUPER
$s = SHIFT
$c = CTRL
$a = ALT

# --- SHELL ---
bind = $mod,          super_l, exec, ags -r 'App.toggleWindow("quicklaunch")'           # search
bind = $mod,          space,   exec, fcitx5-remote -t                                    # change keyboard language
bind = $mod,          delete,  exec, rofi -show power-menu -modi power-menu:rofi-power-menu # toggle session menu
bind = $mod,          comma,   exec, ags -r 'App.toggleWindow("sidebar-left")'           # toggle left sidebar
bind = $mod,          period,  exec, ags -r 'App.toggleWindow("sidebar-right")'          # toggle right sidebar
bind = $mod,          slash,   exec, $scriptDir/cheatsheet.sh                            # toggle cheatsheet
bind = $mod,          B,       exec, ags -r 'App.toggleWindow("bar")'                   # toggle bar

# --- UTILITIES ---
bind = $mod,       minus, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-               # adjust volume
bind = $mod,       equal, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+               # adjust volume
bind = $mod,       M,     exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle              # mute volume
bind = $mod $s,    V,     exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy # clipboard history
bind = $mod $s,    S,     exec, grimblast copy area                                     # screenshot >> clipboard
bind = $mod $s $c, S,     exec, grimblast save area ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png # screenshot >> file
bind = $mod $s $a, S,     exec, grimblast copysave area ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png # screenshot >> clipboard & file
bind = $mod $s,    R,     exec, $scriptDir/record.sh region                             # record region
bind = $mod $s $c, R,     exec, $scriptDir/record.sh screen                             # record screen
bind = $mod $s,    G,     exec, $scriptDir/lens.sh                                      # google lens
bind = $mod $s,    M,     exec, mousai                                                  # recognize music
bind = $mod $s,    T,     exec, $scriptDir/ocr.sh                                       # text recognition >> clipboard
bind = $mod $s,    C,     exec, hyprpicker -a                                           # color picker >> clipboard

# --- APPS ---
bind = $mod, W, exec, $browser                                                          # browser
bind = $mod, E, exec, $fileManager                                                      # file manager
bind = $mod, R, exec, $terminal                                                         # terminal
bind = $mod, T, exec, $terminal -e $textEditor                                         # text editor
bind = $mod, Y, exec, $codeEditor                                                       # code editor
bind = $mod, U, exec, $notesEditor                                                      # notes editor
#bind = $mod, I, exec, $settings                                                        # settings

# --- EDITING ---
bind = $c,    Z, sendshortcut, CTRL, Z,    class:.*                                     # undo
bind = $c $s, Z, sendshortcut, CTRL SHIFT, Z, class:.*                                  # redo
bind = $c,    X, sendshortcut, CTRL, X,    class:.*                                     # cut
bind = $c,    C, sendshortcut, CTRL, C,    class:.*                                     # copy
bind = $c,    V, sendshortcut, CTRL, V,    class:.*                                     # paste
bind = $c,    A, sendshortcut, CTRL, A,    class:.*                                     # select all

# --- WINDOWS ---
bindm = $mod, mouse:272, movewindow                                                     # move
bindm = $mod, mouse:273, resizewindow                                                   # resize
bind = $mod,    Q, killactive                                                           # close
bind = $mod $s, Q, forcekillactive                                                      # force close
bind = $mod,    V, togglefloating                                                       # toggle floating
bind = $mod,    D, fullscreen, 1                                                        # maximize
bind = $mod,    F, fullscreen, 2                                                        # fullscreen
bind = $mod,    P, pin                                                                  # pin
# focus direction
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
# move in direction
bind = $mod $s, H, movewindow, l
bind = $mod $s, L, movewindow, r
bind = $mod $s, K, movewindow, u
bind = $mod $s, J, movewindow, d
# adjust split ratio
bind = $mod $s, minus, layoutmsg, splitratio -0.1
bind = $mod $s, equal, layoutmsg, splitratio +0.1
# send to workspace #
bind = $mod $s, 1, exec, $wsScript movetoworkspace 1
bind = $mod $s, 2, exec, $wsScript movetoworkspace 2
bind = $mod $s, 3, exec, $wsScript movetoworkspace 3
bind = $mod $s, 4, exec, $wsScript movetoworkspace 4
bind = $mod $s, 5, exec, $wsScript movetoworkspace 5
# send to workspace # silent
bind = $mod $s $c, 1, exec, $wsScript movetoworkspacesilent 1
bind = $mod $s $c, 2, exec, $wsScript movetoworkspacesilent 2
bind = $mod $s $c, 3, exec, $wsScript movetoworkspacesilent 3
bind = $mod $s $c, 4, exec, $wsScript movetoworkspacesilent 4
bind = $mod $s $c, 5, exec, $wsScript movetoworkspacesilent 5
# send to workspace left/right
bind = $mod $s,    semicolon,  exec, $wsScript movetoworkspace l
bind = $mod $s,    apostrophe, exec, $wsScript movetoworkspace r
# send to workspace left/right silent
bind = $mod $s $c, semicolon,  exec, $wsScript movetoworkspacesilent l
bind = $mod $s $c, apostrophe, exec, $wsScript movetoworkspacesilent r
# send to scratchpad
bind = $mod $s,    grave, movetoworkspace,       special:$scratchpadName
# send to scratchpad silent
bind = $mod $s $c, grave, movetoworkspacesilent, special:$scratchpadName

# --- GROUPS ---
bind = $mod $a, backslash,    togglegroup                                               # toggle group
bind = $mod $a, bracketleft,  changegroupactive, b                                      # switch active tab
bind = $mod $a, bracketright, changegroupactive, f                                      # switch active tab
# group in direction
bind = $mod $a, H, movewindoworgroup, l
bind = $mod $a, L, movewindoworgroup, r
bind = $mod $a, K, movewindoworgroup, u
bind = $mod $a, J, movewindoworgroup, d

# --- WORKSPACES ---
# focus workspace #
bind = $mod, 1, exec, $wsScript workspace 1
bind = $mod, 2, exec, $wsScript workspace 2
bind = $mod, 3, exec, $wsScript workspace 3
bind = $mod, 4, exec, $wsScript workspace 4
bind = $mod, 5, exec, $wsScript workspace 5
# focus left/right
bind = $mod, semicolon,  exec, $wsScript workspace l
bind = $mod, apostrophe, exec, $wsScript workspace r
# toggle scratchpad
bind = $mod, grave, togglespecialworkspace, $scratchpadName
# swap workspace #
bind = $mod $a, 1, exec, $wsScript interchange 1
bind = $mod $a, 2, exec, $wsScript interchange 2
bind = $mod $a, 3, exec, $wsScript interchange 3
bind = $mod $a, 4, exec, $wsScript interchange 4
bind = $mod $a, 5, exec, $wsScript interchange 5
# swap between monitors
bind = $mod $a, semicolon,  exec, $wsScript interchangemonitor -1
bind = $mod $a, apostrophe, exec, $wsScript interchangemonitor +1