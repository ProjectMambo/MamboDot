# =============================================================================
# GENERAL
# =============================================================================

general {
    # --- Borders ---
    gaps_in = 3                    # Gap between windows
    gaps_out = 5                   # Gap between windows and monitor edge
    border_size = 2                # Thickness of the window border
    col.active_border = rgba($orangeAlphaee) rgba($purpleAlphaee) 45deg
    col.inactive_border = rgba($bg_darkAlphaee)

    # --- Interaction ---
    layout = dwindle               # dwindle or master
    no_focus_fallback = false      # If true, focus won't move to a neighbor if nothing is there
    
    # --- Performance ---
    allow_tearing = false          # Set to true for gaming if your GPU supports it
}

decoration {
    rounding = 0                  # How curved the corners are

    # --- Opacity ---
    active_opacity = 1.0           # Fully opaque when focused
    inactive_opacity = 0.9         # Slightly transparent when not focused
    fullscreen_opacity = 1.0

    # --- Blur (The Glass Effect) ---
    blur {
        enabled = true
        size = 3                   # Amount of blur
        passes = 1                 # More passes = higher quality (more GPU usage)
        vibrancy = 0.1696          # Color saturation of the blur
        new_optimizations = true   # Performance boost for blur
    }
}

dwindle {
    preserve_split = true          # Keeps the split direction even if you move windows
    force_split = 2                # 0 = follow mouse, 1 = left/top, 2 = right/bottom
}

group {
    col.border_active = rgba($tealAlphaee) rgba($greenAlphaee) 45deg
    col.border_inactive = rgba($bg_darkAlphaee)

    groupbar {
        font_size = 10
        height = 12
        text_color = rgba($fgAlphaee)
        render_titles = true

        gradients = true
        col.active = rgba($bgAlphaee)
        col.inactive = rgba($bg_darkAlphaee)
    }
}

input {
    kb_layout = us
    follow_mouse = 1               # 0 = click to focus, 1 = focus follows mouse
    mouse_refocus = true           # Refocus when mouse moves back into a window
    sensitivity = 0                # -1.0 to 1.0, 0 means no modification.
    
    touchpad {
        natural_scroll = true      # Reverse scrolling direction
    }
}