# =============================================================================
# KEYBINDS
# =============================================================================

# --- MODIFIERS ---
$mod = SUPER
$s = SHIFT
$c = CTRL
$a = ALT

# --- SHELL ---
bind = $mod, super_l, exec, pkill rofi || rofi -show drun -show-icons -terminal kitty
bind = $mod, space,   exec, fcitx5-remote -t                                    # change keyboard language
bind = $mod,          delete,  exec, rofi -show power-menu -modi power-menu:rofi-power-menu # toggle session menu

# --- APPS ---
bind = $mod, Q, exec, $terminal                                                         # terminal
bind = $mod, W, exec, $browser                                                          # browser
bind = $mod, E, exec, $fileManager                                                      # file manager
bind = $mod, R, exec, $notesEditor                                                      # notes editor
#bind = $mod, T, exec, $terminal -e $textEditor                                         # text editor
#bind = $mod, U, exec, $settings                                                        # settings

# --- WINDOWS ---
bindm = $mod, mouse:272, movewindow                                                     # move
bindm = $mod, mouse:273, resizewindow                                                   # resize
bind = $mod,    C, killactive                                                           # close
bind = $mod $s, C, forcekillactive                                                      # force close
bind = $mod,    V, togglefloating                                                       # toggle floating
bind = $mod,    D, fullscreen, 1                                                        # maximize
bind = $mod,    F, fullscreen, 2                                                        # fullscreen
bind = $mod,    P, pin                                                                  # pin
# focus direction
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
# move in direction
bind = $mod $s, H, movewindow, l
bind = $mod $s, L, movewindow, r
bind = $mod $s, K, movewindow, u
bind = $mod $s, J, movewindow, d
# adjust split ratio
bind = $mod $s, minus, layoutmsg, splitratio -0.1
bind = $mod $s, equal, layoutmsg, splitratio +0.1
# send to workspace #
bind = $mod $s, 1, exec, $wsScript movetoworkspace 1
bind = $mod $s, 2, exec, $wsScript movetoworkspace 2
bind = $mod $s, 3, exec, $wsScript movetoworkspace 3
bind = $mod $s, 4, exec, $wsScript movetoworkspace 4
bind = $mod $s, 5, exec, $wsScript movetoworkspace 5
bind = $mod $s, 6, exec, $wsScript movetoworkspace 6
bind = $mod $s, 7, exec, $wsScript movetoworkspace 7
bind = $mod $s, 8, exec, $wsScript movetoworkspace 8
# send to workspace # silent
bind = $mod $s $a, 1, exec, $wsScript movetoworkspacesilent 1
bind = $mod $s $a, 2, exec, $wsScript movetoworkspacesilent 2
bind = $mod $s $a, 3, exec, $wsScript movetoworkspacesilent 3
bind = $mod $s $a, 4, exec, $wsScript movetoworkspacesilent 4
bind = $mod $s $a, 5, exec, $wsScript movetoworkspacesilent 5
bind = $mod $s $a, 6, exec, $wsScript movetoworkspacesilent 6
bind = $mod $s $a, 7, exec, $wsScript movetoworkspacesilent 7
bind = $mod $s $a, 8, exec, $wsScript movetoworkspacesilent 8
# send to workspace left/right
bind = $mod $s,    semicolon,  exec, $wsScript movetoworkspace l
bind = $mod $s,    apostrophe, exec, $wsScript movetoworkspace r
# send to workspace left/right silent
bind = $mod $s $a, semicolon,  exec, $wsScript movetoworkspacesilent l
bind = $mod $s $a, apostrophe, exec, $wsScript movetoworkspacesilent r
# send to scratchpad
bind = $mod $s,    grave, exec, $wsScript movetoworkspace special:$scratchpadName
# send to scratchpad silent
bind = $mod $s $a, grave, exec, $wsScript movetoworkspacesilent special:$scratchpadName

# --- GROUPS ---
bind = $mod $a, backslash,    togglegroup
bind = $mod $a, bracketleft,  changegroupactive, b
bind = $mod $a, bracketright, changegroupactive, f
# group in direction
bind = $mod $a, H, movewindoworgroup, l
bind = $mod $a, L, movewindoworgroup, r
bind = $mod $a, K, movewindoworgroup, u
bind = $mod $a, J, movewindoworgroup, d

# --- WORKSPACES ---
# focus workspace #
bind = $mod, 1, exec, $wsScript workspace 1
bind = $mod, 2, exec, $wsScript workspace 2
bind = $mod, 3, exec, $wsScript workspace 3
bind = $mod, 4, exec, $wsScript workspace 4
bind = $mod, 5, exec, $wsScript workspace 5
bind = $mod, 6, exec, $wsScript workspace 6
bind = $mod, 7, exec, $wsScript workspace 7
bind = $mod, 8, exec, $wsScript workspace 8
# focus left/right
bind = $mod, semicolon,  exec, $wsScript workspace l
bind = $mod, apostrophe, exec, $wsScript workspace r
# toggle scratchpad
bind = $mod, grave, exec, $wsScript togglespecialworkspace $scratchpadName
# swap workspace #
bind = $mod $a, 1, exec, $wsScript interchange 1
bind = $mod $a, 2, exec, $wsScript interchange 2
bind = $mod $a, 3, exec, $wsScript interchange 3
bind = $mod $a, 4, exec, $wsScript interchange 4
bind = $mod $a, 5, exec, $wsScript interchange 5
bind = $mod $a, 6, exec, $wsScript interchange 6
bind = $mod $a, 7, exec, $wsScript interchange 7
bind = $mod $a, 8, exec, $wsScript interchange 8
# swap workspace left/right
bind = $mod $a, semicolon,  exec, $wsScript interchange l
bind = $mod $a, apostrophe, exec, $wsScript interchange r
