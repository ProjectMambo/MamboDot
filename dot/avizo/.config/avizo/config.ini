[default]
# The overall bounding dimensions of the notification box
width = 248
height = 232
padding = 24

# The corner radius curve
border-radius = 2
border-width = 2

# Configuration of the indicator bar layout
block-height = 12
block-spacing = 2
block-count = 20

# Fading timings
time = 2.0
fade-in = 0.1
fade-out = 0.4

# CORRECT COLOR CHANNELS: rgba(Red, Green, Blue, Alpha)
# Dark Slate background layout
background = rgba(255,215,148,0.8)
border-color = rgba(148,107,40,0.8)

# Neon Green progress block fills
bar-fg-color = rgba(125,161,144,0.8)

# Unfilled progress block trail background
bar-bg-color = rgba(61,50,42,0.8)