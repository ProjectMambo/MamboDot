[default]
# The overall bounding dimensions of the notification box
width = 248
height = 232
padding = 24

# The corner radius curve
border-radius = 16
border-width = 2

# Configuration of the indicator bar layout
block-height = 12
block-spacing = 2
block-count = 20

# Fading timings
fade-in = 0.1
fade-out = 0.4

# CORRECT COLOR CHANNELS: rgba(Red, Green, Blue, Alpha)
# Dark Slate background layout
background = rgba(30, 30, 46, 0.9)
border-color = rgba(245, 194, 231, 0.8)

# Neon Green progress block fills
bar-fg-color = rgba(166, 227, 161, 1.0)

# Unfilled progress block trail background
bar-bg-color = rgba(49, 50, 68, 0.5)